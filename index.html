<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survey Form</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1 id="title">SURVEY FORM</h1>
  <p id="description">Let us know how we can improve freeCodeCamp</p>
  <form id="survey-form">
    <label id="name-label">Enter the name:</label>
    <input id="name" type="text" placeholder="enter your name:" required>
    <br>
    <label id="email-label" for="email"> Enter the email id:</label >
    <input id="email" type="email" placeholder="enter your email id:" required>
    <br>
    <label id="number-label"> Enter the number:</label>
    <input id="number"  type="number" min=10 max="10" placeholder="enter you number" required>
    <br>
    <label for="dropdown">What would you like to see improved?</label>
    <select id="dropdown">
    <option value="">--Choose--</option>
      <option value="opt1">Front-end Projects</option>
        <option value="opt2">Back-end Projects</option>
            <option value="opt3">challenges</option>
                <option value="opt4">Open Source Community</option> 
    </select>
    <p>Gender:</p>
    <label>
      <input type="radio" name="Gender" value="male">Male
    </label>
    <label>
      <input type="radio" name="Gender" value="female">Female
    </label>
    <p>Skills:</p>
    <label>
      <input type="checkbox" name="skills" value="html"> HTML
    </label>
    <label>
    <input type="checkbox" name="skills" value="css"> CSS
    </label>
</body>
    <h2>Any comments or suggestions?</h2>
    <textarea placeholder="Enter your comments or suggestions"></textarea>
    <button id="submit" type="submit">Submit</button>
  </form>
</html>
